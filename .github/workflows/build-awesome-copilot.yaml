name: Build MCP Server - Awesome Copilot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # Every hour at minute 0

jobs:
  build-and-push-image-stdio:
    # GitHub cannot scope on.schedule by repository in YAML, so forks get a skipped run unless manually dispatched.
    if: github.event_name == 'workflow_dispatch' || github.repository == 'microsoft/mcp-dotnet-samples'
    uses: ./.github/workflows/build-container.yaml

    strategy:
      matrix:
        image_name: [ 'awesome-copilot' ]

    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write

    with:
      image_name: ${{ matrix.image_name }}
      force: false
    secrets: inherit
