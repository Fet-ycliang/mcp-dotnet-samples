# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: outlook-email

metadata:
  template: azd-init@1.14.0

services:
  # ──────────────────────────────────────────────────────────────────────────────
  # Option A (default): Azure Functions (Flex Consumption) backend
  # Use this when AZURE_DEPLOY_ACA is false (the default).
  # ──────────────────────────────────────────────────────────────────────────────
  outlook-email:
    project: src/McpSamples.OutlookEmail.HybridApp
    host: function
    language: csharp

  # ──────────────────────────────────────────────────────────────────────────────
  # Option B (ACA): Azure Container Apps backend
  # To switch to ACA:
  #   1. Set `azd env set AZURE_DEPLOY_ACA true`
  #   2. Comment out the `outlook-email` Function App service above
  #   3. Uncomment the `outlook-email-aca` service below
  # ──────────────────────────────────────────────────────────────────────────────
  # outlook-email-aca:
  #   project: src/McpSamples.OutlookEmail.HybridApp
  #   host: containerapp
  #   language: dotnet
  #   docker:
  #     path: ../../../Dockerfile.outlook-email-azure
  #     context: ../../../
  #     remoteBuild: true
